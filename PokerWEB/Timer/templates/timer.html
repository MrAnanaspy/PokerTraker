<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Покерный таймер с рейтингом игроков</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #ff0000;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            color: #ffcc00;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #ff6666;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .players-section {
            flex: 1;
            min-width: 350px;
            background-color: #111;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
        }
        
        .timer-section {
            flex: 2;
            min-width: 400px;
            background-color: #111;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
        }
        
        .time-display {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .time {
            font-size: 6rem;
            font-weight: 700;
            color: #ffcc00;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.7);
            margin: 10px 0;
            font-family: 'Courier New', monospace;
        }
        
        .level-display {
            text-align: center;
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 1px solid #ff0000;
        }
        
        .level-title {
            font-size: 1.5rem;
            color: #ff6666;
            margin-bottom: 10px;
        }
        
        .level-number {
            font-size: 2.5rem;
            color: #ffcc00;
            font-weight: bold;
        }
        
        .blinds-display {
            display: flex;
            justify-content: space-around;
            background-color: #222;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 40px;
            border: 1px solid #ff0000;
        }
        
        .blind {
            text-align: center;
        }
        
        .blind-title {
            font-size: 1.2rem;
            color: #ff6666;
            margin-bottom: 10px;
        }
        
        .blind-value {
            font-size: 2.8rem;
            font-weight: bold;
            color: #fff;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .start-btn {
            background-color: #222;
            color: #ffcc00;
            border: 2px solid #ffcc00;
        }
        
        .start-btn:hover {
            background-color: #ffcc00;
            color: #000;
            transform: translateY(-3px);
        }
        
        .pause-btn {
            background-color: #222;
            color: #ff4444;
            border: 2px solid #ff4444;
        }
        
        .pause-btn:hover {
            background-color: #ff4444;
            color: #fff;
            transform: translateY(-3px);
        }
        
        .reset-btn {
            background-color: #222;
            color: #ff6666;
            border: 2px solid #ff6666;
        }
        
        .reset-btn:hover {
            background-color: #ff6666;
            color: #fff;
            transform: translateY(-3px);
        }
        
        .next-btn {
            background-color: #222;
            color: #ff9900;
            border: 2px solid #ff9900;
        }
        
        .next-btn:hover {
            background-color: #ff9900;
            color: #000;
            transform: translateY(-3px);
        }
        
        .section-title {
            font-size: 1.8rem;
            color: #ffcc00;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ff0000;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .players-list {
            max-height: 600px;
            overflow-y: auto;
            margin-top: 20px;
        }
        
        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #222;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #ffcc00;
            transition: all 0.3s ease;
        }
        
        .player-item.eliminated {
            opacity: 0.6;
            border-left-color: #ff4444;
            text-decoration: line-through;
        }
        
        .player-info {
            flex: 1;
        }
        
        .player-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }
        
        .player-stats {
            display: flex;
            gap: 15px;
        }
        
        .player-rating {
            color: #ffcc00;
            font-weight: bold;
        }
        
        .player-chips {
            color: #ff6666;
        }
        
        .player-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 12px;
            font-size: 0.9rem;
            border-radius: 5px;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .eliminate-btn {
            background-color: #ff4444;
        }
        
        .eliminate-btn:hover {
            background-color: #cc0000;
        }
        
        .revive-btn {
            background-color: #ff9900;
        }
        
        .revive-btn:hover {
            background-color: #cc7700;
        }
        
        .knockout-btn {
            background-color: #222;
            color: #ffcc00;
            border: 1px solid #ffcc00;
        }
        
        .knockout-btn:hover {
            background-color: #ffcc00;
            color: #000;
        }
        
        .knockout-log {
            margin-top: 30px;
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #ff0000;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-title {
            font-size: 1.3rem;
            color: #ffcc00;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .log-item {
            padding: 10px;
            border-bottom: 1px solid #444;
            margin-bottom: 10px;
            color: #ff6666;
        }
        
        .log-item strong {
            color: #ffcc00;
        }
        
        .tournament-info {
            display: flex;
            justify-content: space-around;
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            border: 1px solid #ff0000;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-title {
            font-size: 1.2rem;
            color: #ff6666;
            margin-bottom: 10px;
        }
        
        .info-value {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #ff6666;
            font-size: 1rem;
            padding-top: 20px;
            border-top: 1px solid #ff0000;
        }
        
        .add-player-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .add-player-input {
            flex: 1;
            padding: 12px 15px;
            background-color: #222;
            border: 1px solid #ff0000;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        
        .add-player-btn {
            padding: 12px 20px;
            background-color: #222;
            color: #ffcc00;
            border: 2px solid #ffcc00;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .add-player-btn:hover {
            background-color: #ffcc00;
            color: #000;
        }
        
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            .time {
                font-size: 4rem;
            }
            
            .controls {
                flex-wrap: wrap;
            }
            
            button {
                flex: 1;
                min-width: 150px;
            }
        }
        
        .sound-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        
        .sound-toggle {
            background: none;
            border: none;
            color: #ff6666;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }
        
        .sound-toggle:hover {
            color: #ffcc00;
        }
        
        /* Стили для скроллбара */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #222;
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff0000;
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-hourglass-half"></i> Покерный таймер</h1>
        </header>
        
        <div class="main-content">
            <section class="players-section">
                <h2 class="section-title"><i class="fas fa-users"></i> Участники</h2>
                
                <div class="add-player-form">
                    <input type="text" class="add-player-input" id="playerNameInput" placeholder="Имя нового игрока">
                    <button class="add-player-btn" id="addPlayerBtn"><i class="fas fa-plus"></i> Добавить</button>
                </div>
                
                <div class="players-list" id="playersList">
                    <!-- Список игроков будет заполнен через JavaScript -->
                </div>
                
                <div class="knockout-log">
                    <div class="log-title">
                        <span><i class="fas fa-skull-crossbones"></i> История выбываний</span>
                        <button class="action-btn" id="clearLogBtn">Очистить</button>
                    </div>
                    <div id="knockoutLog">
                        <!-- История выбываний будет заполнена через JavaScript -->
                    </div>
                </div>
            </section>
            
            <section class="timer-section">
                <div class="time-display">
                    <div class="level-display">
                        <div class="level-title">Текущий уровень</div>
                        <div class="level-number" id="current-level">1</div>
                    </div>
                    
                    <div class="time" id="timer">15:00</div>
                    
                    <div class="blinds-display">
                        <div class="blind">
                            <div class="blind-title">Малый блайнд</div>
                            <div class="blind-value" id="small-blind">25</div>
                        </div>
                        <div class="blind">
                            <div class="blind-title">Большой блайнд</div>
                            <div class="blind-value" id="big-blind">50</div>
                        </div>
                    </div>
                </div>
                
                <div class="controls">
                    <button id="startBtn" class="start-btn">
                        <i class="fas fa-play"></i> Старт
                    </button>
                    <button id="pauseBtn" class="pause-btn">
                        <i class="fas fa-pause"></i> Пауза
                    </button>
                    <button id="resetBtn" class="reset-btn">
                        <i class="fas fa-redo"></i> Сброс
                    </button>
                    <button id="nextBtn" class="next-btn">
                        <i class="fas fa-forward"></i> Следующий уровень
                    </button>
                </div>
                
                <div class="tournament-info">
                    <div class="info-item">
                        <div class="info-title">Игроков в игре</div>
                        <div class="info-value" id="active-players">9</div>
                    </div>
                    <div class="info-item">
                        <div class="info-title">Выбыло</div>
                        <div class="info-value" id="eliminated-players">0</div>
                    </div>
                    <div class="info-item">
                        <div class="info-title">Общее кол-во</div>
                        <div class="info-value" id="total-players">9</div>
                    </div>
                </div>
                
                <div class="sound-control">
                    <button id="soundToggle" class="sound-toggle">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <span>Звуковые уведомления</span>
                </div>
            </section>
        </div>
        
        <footer class="footer">
            <p>Покерный таймер для турниров | Черный, красный, желтый дизайн | Система отслеживания выбываний</p>
        </footer>
    </div>

    <!-- Аудио для уведомлений -->
    <audio id="tickSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-unlock-game-notification-253.mp3" type="audio/mpeg">
    </audio>
    <audio id="endSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Элементы DOM
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const nextBtn = document.getElementById('nextBtn');
        const currentLevelDisplay = document.getElementById('current-level');
        const smallBlindDisplay = document.getElementById('small-blind');
        const bigBlindDisplay = document.getElementById('big-blind');
        const playersList = document.getElementById('playersList');
        const knockoutLog = document.getElementById('knockoutLog');
        const activePlayersDisplay = document.getElementById('active-players');
        const eliminatedPlayersDisplay = document.getElementById('eliminated-players');
        const totalPlayersDisplay = document.getElementById('total-players');
        const playerNameInput = document.getElementById('playerNameInput');
        const addPlayerBtn = document.getElementById('addPlayerBtn');
        const clearLogBtn = document.getElementById('clearLogBtn');
        const soundToggle = document.getElementById('soundToggle');
        
        // Аудио элементы
        const tickSound = document.getElementById('tickSound');
        const endSound = document.getElementById('endSound');
        
        // Переменные таймера
        let timerInterval;
        let timeLeft = 15 * 60; // 15 минут в секундах
        let isRunning = false;
        let currentLevel = 1;
        let soundEnabled = true;
        
        // Данные игроков
        let players = [
            {id: 1, name: "Алексей", rating: 1250, chips: 15000, eliminated: false, eliminatedBy: null},
            {id: 2, name: "Дмитрий", rating: 1100, chips: 12000, eliminated: false, eliminatedBy: null},
            {id: 3, name: "Иван", rating: 980, chips: 8000, eliminated: false, eliminatedBy: null},
            {id: 4, name: "Ольга", rating: 1350, chips: 18000, eliminated: false, eliminatedBy: null},
            {id: 5, name: "Сергей", rating: 1050, chips: 10000, eliminated: false, eliminatedBy: null},
            {id: 6, name: "Мария", rating: 1150, chips: 14000, eliminated: false, eliminatedBy: null},
            {id: 7, name: "Андрей", rating: 950, chips: 7000, eliminated: false, eliminatedBy: null},
            {id: 8, name: "Екатерина", rating: 1300, chips: 16000, eliminated: false, eliminatedBy: null},
            {id: 9, name: "Николай", rating: 1000, chips: 9000, eliminated: false, eliminatedBy: null}
        ];
        
        // История выбываний
        let knockoutHistory = [];
        
        // Структуры блайндов
        const blindStructure = [
            {small: 25, big: 50, ante: 0, duration: 15},
            {small: 50, big: 100, ante: 0, duration: 15},
            {small: 75, big: 150, ante: 0, duration: 15},
            {small: 100, big: 200, ante: 0, duration: 15},
            {small: 150, big: 300, ante: 0, duration: 15},
            {small: 200, big: 400, ante: 0, duration: 15},
            {small: 300, big: 600, ante: 0, duration: 15},
            {small: 400, big: 800, ante: 100, duration: 15},
            {small: 500, big: 1000, ante: 100, duration: 15},
            {small: 600, big: 1200, ante: 200, duration: 15},
            {small: 800, big: 1600, ante: 200, duration: 15},
            {small: 1000, big: 2000, ante: 300, duration: 15}
        ];
        
        // Инициализация
        function init() {
            updateTimerDisplay();
            updateBlindsDisplay();
            updatePlayersList();
            updateKnockoutLog();
            updatePlayersCount();
            
            // Установка обработчиков событий
            startBtn.addEventListener('click', startTimer);
            pauseBtn.addEventListener('click', pauseTimer);
            resetBtn.addEventListener('click', resetTimer);
            nextBtn.addEventListener('click', nextLevel);
            
            addPlayerBtn.addEventListener('click', addPlayer);
            playerNameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') addPlayer();
            });
            
            clearLogBtn.addEventListener('click', clearKnockoutLog);
            soundToggle.addEventListener('click', toggleSound);
        }
        
        // Обновление отображения таймера
        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Изменение цвета при малом времени
            if (timeLeft <= 60 && timeLeft > 0) {
                timerDisplay.style.color = '#ff4444';
                timerDisplay.style.textShadow = '0 0 20px rgba(255, 68, 68, 0.7)';
                
                // Звуковой сигнал при последней минуте
                if (soundEnabled && timeLeft <= 60 && timeLeft % 10 === 0) {
                    playTickSound();
                }
            } else {
                timerDisplay.style.color = '#ffcc00';
                timerDisplay.style.textShadow = '0 0 20px rgba(255, 204, 0, 0.7)';
            }
        }
        
        // Обновление отображения блайндов
        function updateBlindsDisplay() {
            const levelIndex = Math.min(currentLevel - 1, blindStructure.length - 1);
            const currentBlinds = blindStructure[levelIndex];
            
            smallBlindDisplay.textContent = currentBlinds.small;
            bigBlindDisplay.textContent = currentBlinds.big;
            currentLevelDisplay.textContent = currentLevel;
        }
        
        // Обновление списка игроков
        function updatePlayersList() {
            playersList.innerHTML = '';
            
            // Сортируем игроков: сначала активные по рейтингу, затем выбывшие
            const sortedPlayers = [...players].sort((a, b) => {
                if (a.eliminated && !b.eliminated) return 1;
                if (!a.eliminated && b.eliminated) return -1;
                return b.rating - a.rating;
            });
            
            sortedPlayers.forEach(player => {
                const playerElement = document.createElement('div');
                playerElement.className = `player-item ${player.eliminated ? 'eliminated' : ''}`;
                playerElement.dataset.id = player.id;
                
                playerElement.innerHTML = `
                    <div class="player-info">
                        <div class="player-name">${player.name}</div>
                        <div class="player-stats">
                            <span class="player-rating">Рейтинг: ${player.rating}</span>
                            <span class="player-chips">Фишки: ${player.chips.toLocaleString()}</span>
                            ${player.eliminated ? `<span style="color: #ff4444;">Выбыл: ${player.eliminatedBy}</span>` : ''}
                        </div>
                    </div>
                    <div class="player-actions">
                        ${!player.eliminated ? `
                            <button class="action-btn knockouts-btn" data-id="${player.id}">Кого выбил?</button>
                            <button class="action-btn eliminate-btn" data-id="${player.id}">Выбыл</button>
                        ` : `
                            <button class="action-btn revive-btn" data-id="${player.id}">Вернуть</button>
                        `}
                    </div>
                `;
                
                playersList.appendChild(playerElement);
            });
            
            // Добавляем обработчики для кнопок
            document.querySelectorAll('.eliminate-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const playerId = parseInt(this.dataset.id);
                    eliminatePlayer(playerId);
                });
            });
            
            document.querySelectorAll('.revive-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const playerId = parseInt(this.dataset.id);
                    revivePlayer(playerId);
                });
            });
            
            document.querySelectorAll('.knockouts-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const playerId = parseInt(this.dataset.id);
                    showKnockoutDialog(playerId);
                });
            });
        }
        
        // Показать диалог выбора выбитого игрока
        function showKnockoutDialog(knockerId) {
            const knocker = players.find(p => p.id === knockerId);
            if (!knocker) return;
            
            // Создаем модальное окно
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.backgroundColor = 'rgba(0,0,0,0.8)';
            modal.style.display = 'flex';
            modal.style.justifyContent = 'center';
            modal.style.alignItems = 'center';
            modal.style.zIndex = '1000';
            
            // Получаем список активных игроков, кроме того, кто выбивает
            const availablePlayers = players.filter(p => !p.eliminated && p.id !== knockerId);
            
            modal.innerHTML = `
                <div style="background-color: #111; padding: 30px; border-radius: 15px; border: 2px solid #ff0000; max-width: 500px; width: 90%;">
                    <h2 style="color: #ffcc00; margin-bottom: 20px; text-align: center;">
                        <i class="fas fa-skull-crossbones"></i> Кого выбил ${knocker.name}?
                    </h2>
                    <div style="margin-bottom: 25px;">
                        ${availablePlayers.length > 0 ? 
                            availablePlayers.map(p => `
                                <button class="knockout-select-btn" 
                                        data-knocker="${knockerId}" 
                                        data-target="${p.id}"
                                        style="display: block; width: 100%; padding: 15px; margin-bottom: 10px; background-color: #222; color: white; border: 1px solid #ff4444; border-radius: 8px; cursor: pointer; font-size: 1.1rem; text-align: left;">
                                    ${p.name} (Рейтинг: ${p.rating}, Фишки: ${p.chips.toLocaleString()})
                                </button>
                            `).join('') :
                            '<p style="text-align: center; color: #ff6666;">Нет других активных игроков</p>'
                        }
                    </div>
                    <div style="text-align: center;">
                        <button id="cancelKnockout" style="padding: 12px 25px; background-color: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;">
                            Отмена
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Добавляем обработчики для кнопок выбора
            modal.querySelectorAll('.knockout-select-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const knockerId = parseInt(this.dataset.knocker);
                    const targetId = parseInt(this.dataset.target);
                    registerKnockout(knockerId, targetId);
                    document.body.removeChild(modal);
                });
            });
            
            // Обработчик кнопки отмены
            document.getElementById('cancelKnockout').addEventListener('click', function() {
                document.body.removeChild(modal);
            });
        }
        
        // Зарегистрировать выбивание игрока
        function registerKnockout(knockerId, targetId) {
            const knocker = players.find(p => p.id === knockerId);
            const target = players.find(p => p.id === targetId);
            
            if (!knocker || !target || target.eliminated) return;
            
            // Помечаем цель как выбывшую
            target.eliminated = true;
            target.eliminatedBy = knocker.name;
            
            // Увеличиваем рейтинг выбившего
            knocker.rating += 50;
            knocker.chips += target.chips; // Забираем фишки выбитого
            
            // Добавляем запись в историю
            const knockoutRecord = {
                id: knockoutHistory.length + 1,
                knocker: knocker.name,
                target: target.name,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}),
                level: currentLevel,
                chips: target.chips
            };
            
            knockoutHistory.unshift(knockoutRecord); // Добавляем в начало
            
            // Обновляем интерфейс
            updatePlayersList();
            updateKnockoutLog();
            updatePlayersCount();
            
            // Воспроизводим звук
            if (soundEnabled) {
                playEndSound();
            }
        }
        
        // Исключить игрока (без указания, кто выбил)
        function eliminatePlayer(playerId) {
            const player = players.find(p => p.id === playerId);
            if (!player || player.eliminated) return;
            
            player.eliminated = true;
            player.eliminatedBy = "Самовыбытие";
            
            // Добавляем запись в историю
            const knockoutRecord = {
                id: knockoutHistory.length + 1,
                knocker: "Система",
                target: player.name,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}),
                level: currentLevel,
                chips: player.chips
            };
            
            knockoutHistory.unshift(knockoutRecord);
            
            updatePlayersList();
            updateKnockoutLog();
            updatePlayersCount();
        }
        
        // Вернуть игрока в игру
        function revivePlayer(playerId) {
            const player = players.find(p => p.id === playerId);
            if (!player || !player.eliminated) return;
            
            player.eliminated = false;
            player.eliminatedBy = null;
            
            // Удаляем последнюю запись об этом игроке из истории выбываний
            const playerName = player.name;
            for (let i = 0; i < knockoutHistory.length; i++) {
                if (knockoutHistory[i].target === playerName) {
                    knockoutHistory.splice(i, 1);
                    break;
                }
            }
            
            updatePlayersList();
            updateKnockoutLog();
            updatePlayersCount();
        }
        
        // Обновить историю выбываний
        function updateKnockoutLog() {
            knockoutLog.innerHTML = '';
            
            if (knockoutHistory.length === 0) {
                knockoutLog.innerHTML = '<div class="log-item">Пока никто не выбыл</div>';
                return;
            }
            
            knockoutHistory.forEach(record => {
                const logItem = document.createElement('div');
                logItem.className = 'log-item';
                logItem.innerHTML = `
                    <strong>${record.knocker}</strong> выбил <strong>${record.target}</strong> 
                    (уровень ${record.level}, ${record.time}) <br>
                    <small>Получено фишек: ${record.chips.toLocaleString()}</small>
                `;
                knockoutLog.appendChild(logItem);
            });
        }
        
        // Очистить историю выбываний
        function clearKnockoutLog() {
            if (confirm("Очистить всю историю выбываний?")) {
                knockoutHistory = [];
                updateKnockoutLog();
            }
        }
        
        // Обновить счетчики игроков
        function updatePlayersCount() {
            const total = players.length;
            const eliminated = players.filter(p => p.eliminated).length;
            const active = total - eliminated;
            
            activePlayersDisplay.textContent = active;
            eliminatedPlayersDisplay.textContent = eliminated;
            totalPlayersDisplay.textContent = total;
        }
        
        // Добавить нового игрока
        function addPlayer() {
            const name = playerNameInput.value.trim();
            if (!name) {
                alert("Введите имя игрока");
                return;
            }
            
            // Проверяем, нет ли уже игрока с таким именем
            if (players.some(p => p.name.toLowerCase() === name.toLowerCase())) {
                alert("Игрок с таким именем уже существует");
                return;
            }
            
            // Создаем нового игрока
            const newPlayer = {
                id: players.length > 0 ? Math.max(...players.map(p => p.id)) + 1 : 1,
                name: name,
                rating: 1000, // Начальный рейтинг
                chips: 10000, // Стартовый стек
                eliminated: false,
                eliminatedBy: null
            };
            
            players.push(newPlayer);
            updatePlayersList();
            updatePlayersCount();
            
            // Очищаем поле ввода
            playerNameInput.value = '';
            playerNameInput.focus();
        }
        
        // Запуск таймера
        function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                // Когда время вышло
                if (timeLeft <= 0) {
                    levelComplete();
                }
            }, 1000);
        }
        
        // Пауза таймера
        function pauseTimer() {
            if (!isRunning) return;
            
            isRunning = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            
            clearInterval(timerInterval);
        }
        
        // Сброс таймера
        function resetTimer() {
            pauseTimer();
            currentLevel = 1;
            timeLeft = blindStructure[0].duration * 60;
            updateTimerDisplay();
            updateBlindsDisplay();
        }
        
        // Переход на следующий уровень
        function nextLevel() {
            // Если текущий уровень не последний
            if (currentLevel < blindStructure.length) {
                currentLevel++;
                const newDuration = blindStructure[currentLevel - 1].duration;
                timeLeft = newDuration * 60;
                
                updateTimerDisplay();
                updateBlindsDisplay();
                
                // Воспроизведение звука
                if (soundEnabled) {
                    playEndSound();
                }
            } else {
                // Если это последний уровень
                alert('Турнир завершен! Это был последний уровень блайндов.');
            }
        }
        
        // Завершение уровня
        function levelComplete() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            
            // Воспроизведение звука
            if (soundEnabled) {
                playEndSound();
            }
            
            // Автоматический переход на следующий уровень через 3 секунды
            setTimeout(() => {
                nextLevel();
                startTimer();
            }, 3000);
        }
        
        // Переключение звука
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const icon = soundToggle.querySelector('i');
            
            if (soundEnabled) {
                icon.classList.remove('fa-volume-mute');
                icon.classList.add('fa-volume-up');
                soundToggle.style.color = '#ff6666';
            } else {
                icon.classList.remove('fa-volume-up');
                icon.classList.add('fa-volume-mute');
                soundToggle.style.color = '#666';
            }
        }
        
        // Воспроизведение звука тика
        function playTickSound() {
            tickSound.currentTime = 0;
            tickSound.play().catch(e => console.log("Не удалось воспроизвести звук: ", e));
        }
        
        // Воспроизведение звука завершения
        function playEndSound() {
            endSound.currentTime = 0;
            endSound.play().catch(e => console.log("Не удалось воспроизвести звук: ", e));
        }
        
        // Запуск приложения при загрузке страницы
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
